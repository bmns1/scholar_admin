<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVA Scholarship — Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    :root {
        --clr-forest: #1a3c34;
        --clr-sage: #4a7c6f;
        --clr-gold: #c9a84c;
        --clr-gold-light: #f5ecd0;
        --clr-cream: #faf8f3;
        --clr-warm: #f0ebe1;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--clr-cream);
        color: #2d3436;
    }

    h1, h2, h3, h4 {
        font-family: 'Lora', serif;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--clr-forest), var(--clr-sage));
        color: #fff;
        padding: .6rem 1.25rem;
        border-radius: .5rem;
        font-weight: 600;
        transition: all .25s;
    }

    .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(26, 60, 52, .25);
    }

    .btn-primary:disabled {
        opacity: .5;
        cursor: not-allowed;
    }

    .btn-gold {
        background: linear-gradient(135deg, var(--clr-gold), #d4b45a);
        color: var(--clr-forest);
        padding: .6rem 1.25rem;
        border-radius: .5rem;
        font-weight: 700;
    }

    .btn-ghost {
        background: #fff;
        border: 1.5px solid #e5e0d0;
        padding: .55rem 1rem;
        border-radius: .5rem;
        font-weight: 500;
    }

    .btn-ghost:hover {
        border-color: var(--clr-gold);
    }

    .card {
        background: #fff;
        border: 1px solid #e8e3d8;
        border-radius: .85rem;
    }

    .form-input {
        width: 100%;
        padding: .55rem .8rem;
        border-radius: .5rem;
        border: 1.5px solid #d4cfc4;
        background: #fff;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--clr-gold);
        box-shadow: 0 0 0 3px rgba(201, 168, 76, .15);
    }

    .chip {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
    }

    .chip-sent {
        background: #fef6dd;
        color: #8a6a15;
    }

    .chip-done {
        background: #e0f2ea;
        color: #1a5c46;
    }

    .chip-pending {
        background: #f1efe8;
        color: #6b6b6b;
    }

    .track-budding {
        background: #fdf2e9;
        color: #8a4c15;
    }

    .track-junior {
        background: #e6f0ff;
        color: #1e3a8a;
    }

    .track-future {
        background: #ecfdf5;
        color: #065f46;
    }

    .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 1rem;
    }

    .modal {
        background: #fff;
        border-radius: 1rem;
        max-width: 720px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
    }

    .tab {
        padding: .5rem 1rem;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        font-weight: 500;
        color: #6b6b6b;
    }

    .tab.active {
        border-color: var(--clr-gold);
        color: var(--clr-forest);
    }
    </style>
</head>
<body class="min-h-screen">

    <!-- ────────── LOGIN ────────── -->
    <section id="loginView" class="min-h-screen flex items-center justify-center p-4">
        <div class="card max-w-md w-full p-8 text-center">
            <div class="inline-block px-4 py-1 rounded-full text-xs font-bold mb-4" style="background:var(--clr-gold-light);color:var(--clr-forest);">ADMIN ACCESS</div>
            <h1 class="text-2xl mb-2" style="color:var(--clr-forest);">SVA Scholarship Portal</h1>
            <p class="text-sm text-gray-600 mb-6">Sign in with your authorized admin Google account.</p>
            <div id="googleBtn" class="flex justify-center"></div>
            <p id="loginError" class="text-red-600 text-sm mt-4 hidden"></p>
            <div class="mt-8 pt-6 border-t border-gray-200 text-left">
                <label class="block text-xs font-semibold text-gray-700 mb-1">Backend Web App URL</label>
                <input id="backendUrl" class="form-input text-xs" placeholder="https://script.google.com/macros/s/.../exec">
                <label class="block text-xs font-semibold text-gray-700 mb-1 mt-3">
                    Recommender Form URL 
                    <span class="text-gray-400">(where recommender_form.html is hosted)</span>
                </label>
                <input id="recommenderUrl" class="form-input text-xs" placeholder="https://yourdomain.com/recommender_form.html">
                <button onclick="saveConfig()" class="btn-ghost text-xs w-full mt-3">Save Config</button>
            </div>
        </div>
    </section>

    <!-- ────────── DASHBOARD ────────── -->
    <section id="dashboardView" class="hidden">
        <header class="bg-white border-b border-gray-200 sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div>
                    <h1 class="text-xl" style="color:var(--clr-forest);">SVA Scholarship — Admin</h1>
                    <p class="text-xs text-gray-500" id="adminEmail"></p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="loadApplications()" class="btn-ghost text-sm">↻ Refresh</button>
                    <button onclick="signOut()" class="btn-ghost text-sm">Sign out</button>
                </div>
            </div>
            <div class="max-w-7xl mx-auto px-6 flex gap-2">
                <div class="tab active" onclick="switchTab('apps',this)">Applications</div>
                <div class="tab" onclick="switchTab('recs',this)">Recommendations</div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <!-- Stats -->
            <div id="statsBar" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6"></div>

            <!-- Applications tab -->
            <div id="tabApps">
                <div class="flex flex-wrap gap-2 mb-4 items-center">
                    <input id="searchBox" class="form-input max-w-xs" placeholder="Search name, email, ID…" oninput="renderApps()">
                    <select id="trackFilter" class="form-input max-w-xs" onchange="renderApps()">
                        <option value="">All tracks</option>
                        <option>Budding Scholar</option>
                        <option>Junior Innovator</option>
                        <option>Future Leader</option>
                    </select>
                    <select id="statusFilter" class="form-input max-w-xs" onchange="renderApps()">
                        <option value="">All statuses</option>
                        <option>Submitted</option>
                        <option>Under Review</option>
                        <option>Approved</option>
                        <option>Rejected</option>
                    </select>
                </div>
                <div id="appsTable" class="card overflow-hidden"></div>
            </div>

            <!-- Recommendations tab -->
            <div id="tabRecs" class="hidden">
                <div id="recsTable" class="card overflow-hidden"></div>
            </div>
        </main>
    </section>

    <!-- ────────── DETAIL MODAL ────────── -->
    <div id="modal" class="modal-bg hidden">
        <div class="modal p-0">
            <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-start rounded-t-xl">
                <div>
                    <h2 class="text-xl" id="modalTitle" style="color:var(--clr-forest);"></h2>
                    <p class="text-xs text-gray-500" id="modalSub"></p>
                </div>
                <button onclick="closeModal()" class="text-2xl text-gray-400 hover:text-gray-700 leading-none">&times;</button>
            </div>
            <div class="p-6" id="modalBody"></div>
        </div>
    </div>

    <script>
    // ── CONFIG ──
    const GOOGLE_CLIENT_ID = "14216824305-v19ecsmrhk1muaglrlhjceqjk5oeqr4n.apps.googleusercontent.com";
    let BACKEND_URL = localStorage.getItem("sva_backend_url") || "";
    let RECOMMENDER_URL = localStorage.getItem("sva_recommender_url") || "";
    let idToken = null;
    let currentEmail = null;
    let applications = [];

    function saveConfig() {
        BACKEND_URL = document.getElementById("backendUrl").value.trim();
        RECOMMENDER_URL = document.getElementById("recommenderUrl").value.trim();
        localStorage.setItem("sva_backend_url", BACKEND_URL);
        localStorage.setItem("sva_recommender_url", RECOMMENDER_URL);
        alert("Saved.");
    }

    // ── GOOGLE AUTH ──
    window.onload = () => {
        document.getElementById("backendUrl").value = BACKEND_URL;
        document.getElementById("recommenderUrl").value = RECOMMENDER_URL;

        const interval = setInterval(() => {
            if (window.google && window.google.accounts) {
                clearInterval(interval);
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleCredential
                });
                google.accounts.id.renderButton(document.getElementById("googleBtn"),
                {
                    theme: "filled_blue",
                    size: "large",
                    text: "signin_with",
                    shape: "rectangular"
                });
            }
        }, 100);
    };

    async function handleCredential(resp) {
        idToken = resp.credential;
        if (!BACKEND_URL) {
            showLoginError("Please set the Backend Web App URL first.");
            return;
        }
        try {
            const r = await callBackend({
                action: "adminVerify",
                token: idToken
            });
            if (r.status !== "success") {
                showLoginError(r.message);
                return;
            }
            currentEmail = r.email;
            document.getElementById("adminEmail").textContent = r.email;
            document.getElementById("loginView").classList.add("hidden");
            document.getElementById("dashboardView").classList.remove("hidden");
            loadApplications();
        } catch (e) {
            showLoginError("Network error: " + e.message);
        }
    }

    function showLoginError(msg) {
        const el = document.getElementById("loginError");
        el.textContent = msg;
        el.classList.remove("hidden");
    }

    function signOut() {
        google.accounts.id.disableAutoSelect();
        location.reload();
    }

    // ── BACKEND CALL ──
    async function callBackend(payload) {
        const r = await fetch(BACKEND_URL, {
            method: "POST",
            body: JSON.stringify(payload),
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            } // avoids CORS preflight on Apps Script
        });
        return r.json();
    }

    // ── LOAD APPS ──
    async function loadApplications() {
        const r = await callBackend({
            action: "listApplications",
            token: idToken
        });
        if (r.status !== "success") {
            alert(r.message);
            return;
        }
        applications = r.applications || [];
        renderStats();
        renderApps();
    }

    function renderStats() {
        const total = applications.length;
        const submitted = applications.filter(a => a.status === "Submitted").length;
        const scored = applications.filter(a => (a.scores || []).length > 0).length;
        const byTrack = t => applications.filter(a => a.track === t).length;
        const html = [
        ["Total", total],
        ["Submitted", submitted],
        ["Scored", scored],
        ["Budding / Junior / Future", `${byTrack("Budding Scholar")} / ${byTrack("Junior Innovator")} / ${byTrack("Future Leader")}`]
        ].map(([l, v]) => `<div class="card p-4"><div class="text-xs text-gray-500 uppercase tracking-wide">${l}</div><div class="text-2xl font-bold mt-1" style="color:var(--clr-forest);">${v}</div></div>`).join("");
        document.getElementById("statsBar").innerHTML = html;
    }

    function trackChip(t) {
        const cls = t === "Budding Scholar" ? "track-budding" : t === "Junior Innovator" ? "track-junior" : "track-future";
        return `<span class="chip ${cls}">${t || "—"}</span>`;
    }

    function renderApps() {
        const q = (document.getElementById("searchBox").value || "").toLowerCase();
        const tf = document.getElementById("trackFilter").value;
        const sf = document.getElementById("statusFilter").value;
        const filtered = applications.filter(a => {
            if (tf && a.track !== tf)
                return false;
            if (sf && a.status !== sf)
                return false;
            if (q) {
                const hay = [a.studentName, a.studentEmail, a.parentEmail, a.studentId].join(" ").toLowerCase();
                if (!hay.includes(q))
                    return false;
            }
            return true;
        });

        if (!filtered.length) {
            document.getElementById("appsTable").innerHTML = '<div class="p-8 text-center text-gray-500">No applications found.</div>';
            return;
        }

        const rows = filtered.map(a => {
            const recCount = (a.recommenders || []).length;
            const recDone = (a.recommenders || []).filter(r => r.status === "Submitted").length;
            const scoreCount = (a.scores || []).length;
            const avg = scoreCount ? (a.scores.reduce((s, x) => s + Number(x.total || 0), 0) / scoreCount).toFixed(1) : "—";
            return `<tr class="border-t border-gray-100 hover:bg-amber-50/30 cursor-pointer" onclick='openModal(${JSON.stringify(a.studentId)})'>
      <td class="p-3"><div class="font-semibold">${escapeHtml(a.studentName || "")}</div><div class="text-xs text-gray-500">${escapeHtml(a.studentId || "")}</div></td>
      <td class="p-3">${escapeHtml(a.grade || "")}</td>
      <td class="p-3">${trackChip(a.track)}</td>
      <td class="p-3 text-xs">${escapeHtml(a.parentEmail || "")}</td>
      <td class="p-3"><span class="chip ${a.status === 'Submitted' ? 'chip-sent' : 'chip-pending'}">${escapeHtml(a.status || "—")}</span></td>
      <td class="p-3 text-xs">${recDone}/${recCount}</td>
      <td class="p-3 text-xs">${scoreCount ? `${avg} <span class="text-gray-400">(${scoreCount})</span>` : "—"}</td>
    </tr>`
            ;
        }).join("");

        document.getElementById("appsTable").innerHTML = `
    <table class="w-full text-sm">
      <thead class="bg-amber-50/60 text-xs uppercase tracking-wide text-gray-600">
        <tr><th class="p-3 text-left">Student</th><th class="p-3 text-left">Grade</th><th class="p-3 text-left">Track</th>
            <th class="p-3 text-left">Parent</th><th class="p-3 text-left">Status</th>
            <th class="p-3 text-left">Recs</th><th class="p-3 text-left">Avg Score</th></tr>
      </thead><tbody>${




        rows}</tbody>
    </table>`
        ;
    }

    function switchTab(which, el) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("tabApps").classList.toggle("hidden", which !== "apps");
        document.getElementById("tabRecs").classList.toggle("hidden", which !== "recs");
        if (which === "recs")
            loadRecs();
    }

    async function loadRecs() {
        const r = await callBackend({
            action: "listRecommendations",
            token: idToken
        });
        if (r.status !== "success") {
            alert(r.message);
            return;
        }
        const items = r.items || [];
        if (!items.length) {
            document.getElementById("recsTable").innerHTML = '<div class="p-8 text-center text-gray-500">No recommendations sent yet.</div>';
            return;
        }
        const rows = items.map(x => `<tr class="border-t border-gray-100">
    <td class="p-3"><div class="font-semibold">${escapeHtml(x.studentName || "")}</div><div class="text-xs text-gray-500">${escapeHtml(x.studentId || "")}</div></td>
    <td class="p-3">${trackChip(x.track)}</td>
    <td class="p-3"><div>${escapeHtml(x.teacherName || "")}</div><div class="text-xs text-gray-500">${escapeHtml(x.teacherEmail || "")}</div></td>
    <td class="p-3 text-xs">${escapeHtml(x.school || "")}</td>
    <td class="p-3"><span class="chip ${x.status === 'Submitted' ? 'chip-done' : 'chip-sent'}">${escapeHtml(x.status || "")}</span></td>
    <td class="p-3 text-xs">${x.submittedOn ? new Date(x.submittedOn).toLocaleDateString() : "—"}</td>
    <td class="p-3">${x.status === 'Submitted' ? `<button onclick='viewRec(${JSON.stringify(x).replace(/'/g, "&#39;")})' class="btn-ghost text-xs">View</button>` : ""}</td>
  </tr>`
        ).join("");
        document.getElementById("recsTable").innerHTML = `<table class="w-full text-sm">
    <thead class="bg-amber-50/60 text-xs uppercase tracking-wide text-gray-600">
      <tr><th class="p-3 text-left">Student</th><th class="p-3 text-left">Track</th><th class="p-3 text-left">Recommender</th>
          <th class="p-3 text-left">School</th><th class="p-3 text-left">Status</th>
          <th class="p-3 text-left">Submitted</th><th></th></tr>
    </thead><tbody>${



        rows}</tbody></table>`;
    }

    function viewRec(rec) {
        document.getElementById("modalTitle").textContent = "Recommendation — " + rec.studentName;
        document.getElementById("modalSub").textContent = `${rec.teacherName} (${rec.teacherEmail}) · ${rec.track}`;
        const resp = rec.responses || {};
        const rows = Object.keys(resp).map(k => `<tr class="border-b border-gray-100"><td class="py-2 pr-4 text-gray-600 align-top">${escapeHtml(k)}</td><td class="py-2"><strong>${escapeHtml(String(resp[k]))}</strong></td></tr>`).join("");
        document.getElementById("modalBody").innerHTML = rows ? `<table class="w-full text-sm">${rows}</table>` : "<p class='text-gray-500'>No responses.</p>";
        document.getElementById("modal").classList.remove("hidden");
    }

    // ── APPLICATION DETAIL MODAL ──
    function openModal(studentId) {
        const a = applications.find(x => String(x.studentId) === String(studentId));
        if (!a)
            return;
        document.getElementById("modalTitle").textContent = a.studentName;
        document.getElementById("modalSub").textContent = `${a.studentId} · Grade ${a.grade} · ${a.track}`;

        const filesHtml = Object.entries(a.files || {}).filter(([, v]) => v).map(([k, v]) =>
        `<a href="${escapeHtml(v)}" target="_blank" class="inline-block btn-ghost text-xs mr-2 mb-2">📄 Form ${k}</a>`
        ).join("") || '<span class="text-gray-500 text-sm">No files uploaded.</span>';

        const recs = a.recommenders || [];
        const recsHtml = recs.length ? recs.map(r => `
    <div class="flex items-center justify-between py-2 border-b border-gray-100 text-sm">
      <div><strong>${
        escapeHtml(r.teacherName || "")}</strong> <span class="text-gray-500">· ${escapeHtml(r.teacherEmail || "")}</span><br>
        <span class="text-xs text-gray-500">${escapeHtml(r.school || "")}</span></div>
      <span class="chip ${r.status === 'Submitted' ? 'chip-done' : 'chip-sent'}">${escapeHtml(r.status || "")}</span>
    </div>`
        ).join("") : '<p class="text-sm text-gray-500">No recommenders invited yet.</p>';

        const myScore = (a.scores || []).find(s => (s.scorer || "").toLowerCase() === (currentEmail || "").toLowerCase()) || {};

        document.getElementById("modalBody").innerHTML = `
    <div class="mb-6">
      <div class="flex items-center gap-2 mb-2">${
        trackChip(a.track)} <span class="chip chip-sent">${escapeHtml(a.status || "")}</span></div>
      <p class="text-sm text-gray-600"><strong>Parent:</strong> ${escapeHtml(a.parentEmail || "")} &nbsp;·&nbsp; <strong>Student:</strong> ${escapeHtml(a.studentEmail || "")}</p>
      <p class="text-sm text-gray-600 mt-1"><strong>Submitted:</strong> ${a.timestamp ? new Date(a.timestamp).toLocaleString() : "—"}</p>
      ${a.folderLink ? `<a href="${escapeHtml(a.folderLink)}" target="_blank" class="btn-gold text-xs inline-block mt-3">Open Drive Folder ↗</a>` : ""}
    </div>

    <h3 class="text-sm font-bold uppercase tracking-wide text-gray-600 mb-2">Uploaded Forms</h3>
    <div class="mb-6">${


        filesHtml}</div>

    <h3 class="text-sm font-bold uppercase tracking-wide text-gray-600 mb-2 flex items-center justify-between">
      <span>Recommenders</span>
      <button onclick="showRecForm('${


        a.studentId}')" class="btn-gold text-xs">+ Send Secure Link</button>
    </h3>
    <div class="mb-6">${
        recsHtml}</div>

    <div id="recFormWrap" class="hidden card p-4 mb-6" style="background:var(--clr-gold-light);"></div>

    <h3 class="text-sm font-bold uppercase tracking-wide text-gray-600 mb-3">Your Evaluation</h3>
    ${



        scoreFormHtml(a, myScore)}
  `
        ;

        document.getElementById("modal").classList.remove("hidden");
    }

    function scoreFormHtml(a, s) {
        const rubric = rubricForTrack(a.track);
        return `
  <div class="card p-4" style="border:1.5px solid var(--clr-gold);">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
      ${

        rubric.map(c => `<div>
        <label class="text-xs font-semibold text-gray-700 block mb-1">${c.label} <span class="text-gray-400">/${c.max}</span></label>
        <input type="number" min="0" max="${c.max}" value="${s[c.key] ?? ""}" data-score="${c.key}" class="form-input" onchange="updateTotal()">
        <p class="text-[11px] text-gray-500 mt-1">${c.desc}</p>
      </div>`).join("")}
    </div>
    <div class="flex items-center gap-3 mb-3">
      <label class="text-xs font-semibold text-gray-700">Recommendation</label>
      <select id="rec_recommendation" class="form-input max-w-xs">
        ${



        ["Pending", "Approve", "Conditional", "Deny"].map(x => `<option ${s.recommendation === x ? "selected" : ""}>${x}</option>`).join("")}
      </select>
      <div class="ml-auto text-sm"><strong>Total:</strong> <span id="scoreTotal" class="text-lg font-bold" style="color:var(--clr-forest);">${
        (Number(s.academic || 0) + Number(s.character || 0) + Number(s.essay || 0) + Number(s.need || 0))}</span> / ${rubric.reduce((x, c) => x + c.max, 0)}</div>
    </div>
    <label class="text-xs font-semibold text-gray-700 block mb-1">Notes</label>
    <textarea id="rec_notes" class="form-input" rows="3" placeholder="Private notes…">${

        escapeHtml(s.notes || "")}</textarea>
    <div class="flex justify-end mt-3">
      <button onclick='saveScore(${
        JSON.stringify(a.studentId)}, ${JSON.stringify(a.studentName)}, ${JSON.stringify(a.track)})' class="btn-primary text-sm">Save Evaluation</button>
    </div>
  </div>`

        ;
    }

    function rubricForTrack(track) {
        // 100-point rubric per track
        if (track === "Budding Scholar")
            return [
            {
                key: "academic",
                max: 20,
                label: "Readiness",
                desc: "Age-appropriate readiness"
            },
            {
                key: "character",
                max: 40,
                label: "Citizenship",
                desc: "Social/emotional, classroom norms"
            },
            {
                key: "essay",
                max: 20,
                label: "Family Fit",
                desc: "Family partnership & support"
            },
            {
                key: "need",
                max: 20,
                label: "Financial Need",
                desc: "Demonstrated need"
            }
            ];
        if (track === "Junior Innovator")
            return [
            {
                key: "academic",
                max: 25,
                label: "Academic",
                desc: "Academic progress & curiosity"
            },
            {
                key: "character",
                max: 30,
                label: "Grit & Citizenship",
                desc: "Teacher assessment traits"
            },
            {
                key: "essay",
                max: 25,
                label: "Parent Essay",
                desc: "Parent essay clarity & fit"
            },
            {
                key: "need",
                max: 20,
                label: "Financial Need",
                desc: "Demonstrated need"
            }
            ];
        return [
        {
            key: "academic",
            max: 25,
            label: "Academic",
            desc: "Transcript / performance"
        },
        {
            key: "character",
            max: 25,
            label: "Character",
            desc: "Recommender ratings"
        },
        {
            key: "essay",
            max: 30,
            label: "Student Essay",
            desc: "Essay depth, voice, maturity"
        },
        {
            key: "need",
            max: 20,
            label: "Financial Need",
            desc: "Demonstrated need"
        }
        ];
    }

    function updateTotal() {
        const inputs = document.querySelectorAll("[data-score]");
        let t = 0;
        inputs.forEach(i => t += Number(i.value || 0));
        document.getElementById("scoreTotal").textContent = t;
    }

    async function saveScore(studentId, studentName, track) {
        const payload = {
            action: "scoreApplication",
            token: idToken,
            studentId,
            studentName,
            track,
            recommendation: document.getElementById("rec_recommendation").value,
            notes: document.getElementById("rec_notes").value
        };
        document.querySelectorAll("[data-score]").forEach(i => payload[i.dataset.score] = Number(i.value || 0));
        const r = await callBackend(payload);
        if (r.status === "success") {
            alert("Saved. Total: " + r.total);
            await loadApplications();
            openModal(studentId);
        } else
            alert(r.message || "Failed.");
    }

    // ── SEND RECOMMENDER LINK FORM ──
    function showRecForm(studentId) {
        if (!RECOMMENDER_URL) {
            alert("Please set the Recommender Form URL in config (sign out → login page).");
            return;
        }
        const wrap = document.getElementById("recFormWrap");
        wrap.classList.remove("hidden");
        wrap.innerHTML = `
    <h4 class="font-bold mb-2" style="color:var(--clr-forest);">Invite Recommenders</h4>
    <p class="text-xs text-gray-600 mb-3">Each recommender receives a secure, single-use link by email.</p>
    <div id="recRows"></div>
    <button onclick="addRecRow()" class="btn-ghost text-xs mt-2">+ Add Recommender</button>
    <div class="mt-3 flex justify-end gap-2">
      <button onclick="document.getElementById('recFormWrap').classList.add('hidden')" class="btn-ghost text-sm">Cancel</button>
      <button onclick="submitRecs('${





        studentId}')" class="btn-primary text-sm">Send Links</button>
    </div>`
        ;
        addRecRow();
    }

    function addRecRow() {
        const r = document.createElement("div");
        r.className = "grid grid-cols-3 gap-2 mb-2";
        r.innerHTML = `<input class="form-input text-sm" placeholder="Teacher name" data-rec="name">
    <input class="form-input text-sm" placeholder="teacher@email.com" data-rec="email">
    <input class="form-input text-sm" placeholder="School" data-rec="school">`

        ;
        document.getElementById("recRows").appendChild(r);
    }

    async function submitRecs(studentId) {
        const rows = document.getElementById("recRows").querySelectorAll("div");
        const recommenders = [];
        rows.forEach(row => {
            const rec = {};
            row.querySelectorAll("[data-rec]").forEach(i => rec[i.dataset.rec] = i.value.trim());
            if (rec.email)
                recommenders.push(rec);
        });
        if (!recommenders.length) {
            alert("Add at least one recommender.");
            return;
        }
        const r = await callBackend({
            action: "sendRecommenderLinks",
            token: idToken,
            studentId,
            recommenders,
            recommenderUrl: RECOMMENDER_URL
        });
        if (r.status !== "success") {
            alert(r.message || "Failed.");
            return;
        }
        alert("Sent " + r.results.filter(x => x.status === "sent").length + " invitation(s).");
        await loadApplications();
        openModal(studentId);
    }

    function closeModal() {
        document.getElementById("modal").classList.add("hidden");
    }

    function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, c => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
        }[c]));
    }
    </script>
</body>
</html>
