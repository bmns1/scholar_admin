<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVA Scholarship — Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    :root {
        --clr-forest: #1a3c34;
        --clr-sage: #4a7c6f;
        --clr-gold: #c9a84c;
        --clr-gold-light: #f5ecd0;
        --clr-cream: #faf8f3;
        --clr-warm: #f0ebe1;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--clr-cream);
        color: #2d3436;
    }

    h1, h2, h3, h4 {
        font-family: 'Lora', serif;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--clr-forest), var(--clr-sage));
        color: #fff;
        padding: .6rem 1.25rem;
        border-radius: .5rem;
        font-weight: 600;
        transition: all .25s;
    }

    .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(26, 60, 52, .25);
    }

    .btn-primary:disabled {
        opacity: .5;
        cursor: not-allowed;
    }

    .btn-gold {
        background: linear-gradient(135deg, var(--clr-gold), #d4b45a);
        color: var(--clr-forest);
        padding: .6rem 1.25rem;
        border-radius: .5rem;
        font-weight: 700;
    }

    .btn-ghost {
        background: #fff;
        border: 1.5px solid #e5e0d0;
        padding: .55rem 1rem;
        border-radius: .5rem;
        font-weight: 500;
    }

    .btn-ghost:hover {
        border-color: var(--clr-gold);
    }

    .card {
        background: #fff;
        border: 1px solid #e8e3d8;
        border-radius: .85rem;
    }

    .form-input {
        width: 100%;
        padding: .55rem .8rem;
        border-radius: .5rem;
        border: 1.5px solid #d4cfc4;
        background: #fff;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--clr-gold);
        box-shadow: 0 0 0 3px rgba(201, 168, 76, .15);
    }

    .chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: .02em;
    }

    .chip-sent {
        background: #fef6dd;
        color: #8a6a15;
    }

    .chip-done {
        background: #e0f2ea;
        color: #1a5c46;
    }

    .chip-pending {
        background: #f1efe8;
        color: #6b6b6b;
    }

    .chip-nominated {
        background: #eef2f7;
        color: #334155;
        border: 1px dashed #94a3b8;
    }

    .chip-warn {
        background: #fef2f2;
        color: #991b1b;
    }

    .track-budding {
        background: #fdf2e9;
        color: #8a4c15;
    }

    .track-junior {
        background: #e6f0ff;
        color: #1e3a8a;
    }

    .track-future {
        background: #ecfdf5;
        color: #065f46;
    }

    .stat-card {
        position: relative;
        overflow: hidden;
    }

    .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--clr-gold), var(--clr-sage));
    }

    .rec-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: .75rem 1rem;
        border-radius: .65rem;
        background: #fafaf6;
        border: 1px solid #ece7d8;
        margin-bottom: .5rem;
    }

    .rec-row.nominated {
        background: #fffdf4;
        border-style: dashed;
        border-color: var(--clr-gold);
    }

    .rec-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--clr-forest), var(--clr-sage));
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 13px;
        flex-shrink: 0;
    }

    .section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: #6b6b6b;
    }

    .score-input {
        text-align: center;
        font-weight: 600;
        font-size: 1.1rem;
    }

    .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 1rem;
    }

    .modal {
        background: #fff;
        border-radius: 1rem;
        max-width: 720px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
    }

    .tab {
        padding: .5rem 1rem;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        font-weight: 500;
        color: #6b6b6b;
    }

    .tab.active {
        border-color: var(--clr-gold);
        color: var(--clr-forest);
    }
    </style>
</head>
<body class="min-h-screen">

    <!-- ────────── LOGIN ────────── -->
    <section id="loginView" class="min-h-screen flex items-center justify-center p-4" style="background:radial-gradient(circle at top right, #f5ecd0 0%, var(--clr-cream) 60%);">
        <div class="card max-w-md w-full p-10 text-center relative overflow-hidden" style="box-shadow:0 20px 60px rgba(26,60,52,.08);">
            <div style="position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--clr-gold),var(--clr-sage),var(--clr-forest));"></div>
            <div class="inline-flex items-center gap-2 px-4 py-1 rounded-full text-[11px] font-bold mb-5 tracking-widest" style="background:var(--clr-gold-light);color:var(--clr-forest);">
                <span style="width:6px;height:6px;border-radius:50%;background:var(--clr-gold);display:inline-block;"></span>
                ADMIN ACCESS
                    
            </div>
            <h1 class="text-3xl mb-1" style="color:var(--clr-forest);letter-spacing:-.01em;">SVA Scholarship</h1>
            <p class="text-sm mb-8" style="color:var(--clr-sage);font-weight:500;">Committee Review & Evaluation Portal</p>
            <div id="googleBtn" class="flex justify-center"></div>
            <p id="loginError" class="text-red-600 text-sm mt-4 hidden"></p>
            <p class="text-[11px] text-gray-400 mt-8 pt-6 border-t border-gray-100">Authorized admin accounts only. Unauthorized access is prohibited.</p>
        </div>
    </section>

    <!-- ────────── DASHBOARD ────────── -->
    <section id="dashboardView" class="hidden">
        <header class="bg-white border-b border-gray-200 sticky top-0 z-20" style="box-shadow:0 1px 3px rgba(0,0,0,.03);">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div style="width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--clr-forest),var(--clr-sage));display:flex;align-items:center;justify-content:center;color:#c9a84c;font-family:'Lora',serif;font-weight:700;font-size:18px;">SVA</div>
                    <div>
                        <h1 class="text-xl leading-tight" style="color:var(--clr-forest);">Scholarship Committee Portal</h1>
                        <p class="text-xs text-gray-500" id="adminEmail"></p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="loadApplications()" class="btn-ghost text-sm">↻ Refresh</button>
                    <button onclick="signOut()" class="btn-ghost text-sm">Sign out</button>
                </div>
            </div>
            <div class="max-w-7xl mx-auto px-6 flex gap-1">
                <div class="tab active" onclick="switchTab('apps',this)">Applications</div>
                <div class="tab" onclick="switchTab('recs',this)">Recommendations</div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <!-- Stats -->
            <div id="statsBar" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6"></div>

            <!-- Applications tab -->
            <div id="tabApps">
                <div class="flex flex-wrap gap-2 mb-4 items-center">
                    <input id="searchBox" class="form-input max-w-xs" placeholder="Search name, email, ID…" oninput="renderApps()">
                    <select id="trackFilter" class="form-input max-w-xs" onchange="renderApps()">
                        <option value="">All tracks</option>
                        <option>Budding Scholar</option>
                        <option>Junior Innovator</option>
                        <option>Future Leader</option>
                    </select>
                    <select id="statusFilter" class="form-input max-w-xs" onchange="renderApps()">
                        <option value="">All statuses</option>
                        <option>Submitted</option>
                        <option>Under Review</option>
                        <option>Approved</option>
                        <option>Rejected</option>
                    </select>
                </div>
                <div id="appsTable" class="card overflow-hidden"></div>
            </div>

            <!-- Recommendations tab -->
            <div id="tabRecs" class="hidden">
                <div id="recsTable" class="card overflow-hidden"></div>
            </div>
        </main>
    </section>

    <!-- ────────── DETAIL MODAL ────────── -->
    <div id="modal" class="modal-bg hidden">
        <div class="modal p-0">
            <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-start rounded-t-xl">
                <div>
                    <h2 class="text-xl" id="modalTitle" style="color:var(--clr-forest);"></h2>
                    <p class="text-xs text-gray-500" id="modalSub"></p>
                </div>
                <button onclick="closeModal()" class="text-2xl text-gray-400 hover:text-gray-700 leading-none">&times;</button>
            </div>
            <div class="p-6" id="modalBody"></div>
        </div>
    </div>

    <script>
    // ── CONFIG ──
    const GOOGLE_CLIENT_ID = "14216824305-v19ecsmrhk1muaglrlhjceqjk5oeqr4n.apps.googleusercontent.com";
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzZ9LBchK0uKXZbrp_F-DuGddmIlXy1nVxjmjDVDTNZr8NXeGhD-AdIdkXeCO7e6kDNvA/exec";
    const RECOMMENDER_URL = "https://recommend.svaportal.com";
    let idToken = null;
    let currentEmail = null;
    let applications = [];

    // ── GOOGLE AUTH ──
    window.onload = () => {
        const interval = setInterval(() => {
            if (window.google && window.google.accounts) {
                clearInterval(interval);
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleCredential
                });
                google.accounts.id.renderButton(document.getElementById("googleBtn"),
                {
                    theme: "filled_blue",
                    size: "large",
                    text: "signin_with",
                    shape: "rectangular"
                });
            }
        }, 100);
    };

    async function handleCredential(resp) {
        idToken = resp.credential;
        try {
            const r = await callBackend({
                action: "adminVerify",
                token: idToken
            });
            if (r.status !== "success") {
                showLoginError(r.message);
                return;
            }
            currentEmail = r.email;
            document.getElementById("adminEmail").textContent = r.email;
            document.getElementById("loginView").classList.add("hidden");
            document.getElementById("dashboardView").classList.remove("hidden");
            loadApplications();
        } catch (e) {
            showLoginError("Network error: " + e.message);
        }
    }

    function showLoginError(msg) {
        const el = document.getElementById("loginError");
        el.textContent = msg;
        el.classList.remove("hidden");
    }

    function signOut() {
        google.accounts.id.disableAutoSelect();
        location.reload();
    }

    // ── BACKEND CALL ──
    async function callBackend(payload) {
        const r = await fetch(BACKEND_URL, {
            method: "POST",
            body: JSON.stringify(payload),
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            } // avoids CORS preflight on Apps Script
        });
        return r.json();
    }

    // ── LOAD APPS ──
    async function loadApplications() {
        const r = await callBackend({
            action: "listApplications",
            token: idToken
        });
        if (r.status !== "success") {
            alert(r.message);
            return;
        }
        applications = r.applications || [];
        renderStats();
        renderApps();
    }

    function renderStats() {
        const total = applications.length;
        const submitted = applications.filter(a => a.status === "Submitted").length;
        const scored = applications.filter(a => (a.scores || []).length > 0).length;
        const pendingRecs = applications.reduce((n, a) => n + (a.recommenders || []).filter(r => r.status !== "Submitted").length, 0);
        const byTrack = t => applications.filter(a => a.track === t).length;
        const cards = [
        {
            label: "Applications",
            value: total,
            sub: submitted + " submitted"
        },
        {
            label: "Awaiting Review",
            value: submitted - scored,
            sub: scored + " scored"
        },
        {
            label: "Pending Recs",
            value: pendingRecs,
            sub: "across all students"
        },
        {
            label: "Budding Scholar",
            value: byTrack("Budding Scholar"),
            sub: "K–2"
        },
        {
            label: "Junior / Future",
            value: byTrack("Junior Innovator") + " / " + byTrack("Future Leader"),
            sub: "3–5 · 6–8"
        }
        ];
        document.getElementById("statsBar").innerHTML = cards.map(c =>
        `<div class="card stat-card p-4">
       <div class="section-label">${c.label}</div>
       <div class="text-2xl font-bold mt-1" style="color:var(--clr-forest);">${c.value}</div>
       <div class="text-xs text-gray-500 mt-1">${c.sub}</div>
     </div>`
        ).join("");
    }

    function trackChip(t) {
        const cls = t === "Budding Scholar" ? "track-budding" : t === "Junior Innovator" ? "track-junior" : "track-future";
        return `<span class="chip ${cls}">${t || "—"}</span>`;
    }

    function renderApps() {
        const q = (document.getElementById("searchBox").value || "").toLowerCase();
        const tf = document.getElementById("trackFilter").value;
        const sf = document.getElementById("statusFilter").value;
        const filtered = applications.filter(a => {
            if (tf && a.track !== tf)
                return false;
            if (sf && a.status !== sf)
                return false;
            if (q) {
                const hay = [a.studentName, a.studentEmail, a.parentEmail, a.studentId].join(" ").toLowerCase();
                if (!hay.includes(q))
                    return false;
            }
            return true;
        });

        if (!filtered.length) {
            document.getElementById("appsTable").innerHTML = '<div class="p-8 text-center text-gray-500">No applications found.</div>';
            return;
        }

        const initials = s => (s || "?").toString().trim().split(/\s+/).map(w => w[0]).slice(0, 2).join("").toUpperCase();
        const rows = filtered.map(a => {
            const invited = a.recommenders || [];
            const recCount = invited.length;
            const recDone = invited.filter(r => r.status === "Submitted").length;
            const nomCount = [a.teacher1, a.teacher2].filter(t => t && t.email).length;
            const scoreCount = (a.scores || []).length;
            const avg = scoreCount ? (a.scores.reduce((s, x) => s + Number(x.total || 0), 0) / scoreCount).toFixed(1) : "—";
            const recLabel = recCount > 0
            ? `<span class="${recDone === recCount ? 'text-emerald-700 font-semibold' : 'text-amber-700'}">${recDone}/${recCount}</span>`
            : (nomCount > 0 ? `<span class="text-gray-500 italic">${nomCount} nominated</span>` : `<span class="text-gray-400">—</span>`);
            return `<tr class="border-t border-gray-100 hover:bg-amber-50/40 cursor-pointer transition" onclick='openModal(${JSON.stringify(a.studentId)})'>
      <td class="p-3">
        <div class="flex items-center gap-3">
          <div class="rec-avatar" style="width:32px;height:32px;font-size:11px;">${

            initials(a.studentName)}</div>
          <div class="min-w-0">
            <div class="font-semibold truncate">${
            escapeHtml(a.studentName || "")}</div>
            <div class="text-xs text-gray-500 font-mono">${escapeHtml(a.studentId || "")}</div>
          </div>
        </div>
      </td>
      <td class="p-3 text-sm">${


            escapeHtml(a.grade || "")}</td>
      <td class="p-3">${trackChip(a.track)}</td>
      <td class="p-3 text-xs text-gray-600 truncate max-w-[180px]">${escapeHtml(a.parentEmail || "")}</td>
      <td class="p-3"><span class="chip ${a.status === 'Submitted' ? 'chip-sent' : 'chip-pending'}">${escapeHtml(a.status || "—")}</span></td>
      <td class="p-3 text-xs">${recLabel}</td>
      <td class="p-3 text-sm">${scoreCount ? `<strong>${avg}</strong> <span class="text-gray-400 text-xs">(${scoreCount})</span>` : "<span class='text-gray-400'>—</span>"}</td>
    </tr>`
            ;
        }).join("");

        document.getElementById("appsTable").innerHTML = `
    <table class="w-full text-sm">
      <thead class="bg-amber-50/60 text-xs uppercase tracking-wide text-gray-600">
        <tr><th class="p-3 text-left">Student</th><th class="p-3 text-left">Grade</th><th class="p-3 text-left">Track</th>
            <th class="p-3 text-left">Parent</th><th class="p-3 text-left">Status</th>
            <th class="p-3 text-left">Recs</th><th class="p-3 text-left">Avg Score</th></tr>
      </thead><tbody>${




        rows}</tbody>
    </table>`
        ;
    }

    function switchTab(which, el) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("tabApps").classList.toggle("hidden", which !== "apps");
        document.getElementById("tabRecs").classList.toggle("hidden", which !== "recs");
        if (which === "recs")
            loadRecs();
    }

    async function loadRecs() {
        const r = await callBackend({
            action: "listRecommendations",
            token: idToken
        });
        if (r.status !== "success") {
            alert(r.message);
            return;
        }
        const items = r.items || [];
        if (!items.length) {
            document.getElementById("recsTable").innerHTML = '<div class="p-8 text-center text-gray-500">No recommendations sent yet.</div>';
            return;
        }
        const rows = items.map(x => `<tr class="border-t border-gray-100">
    <td class="p-3"><div class="font-semibold">${escapeHtml(x.studentName || "")}</div><div class="text-xs text-gray-500">${escapeHtml(x.studentId || "")}</div></td>
    <td class="p-3">${trackChip(x.track)}</td>
    <td class="p-3"><div>${escapeHtml(x.teacherName || "")}</div><div class="text-xs text-gray-500">${escapeHtml(x.teacherEmail || "")}</div></td>
    <td class="p-3 text-xs">${escapeHtml(x.school || "")}</td>
    <td class="p-3"><span class="chip ${x.status === 'Submitted' ? 'chip-done' : 'chip-sent'}">${escapeHtml(x.status || "")}</span></td>
    <td class="p-3 text-xs">${x.submittedOn ? new Date(x.submittedOn).toLocaleDateString() : "—"}</td>
    <td class="p-3">${x.status === 'Submitted' ? `<button onclick='viewRec(${JSON.stringify(x).replace(/'/g, "&#39;")})' class="btn-ghost text-xs">View</button>` : ""}</td>
  </tr>`
        ).join("");
        document.getElementById("recsTable").innerHTML = `<table class="w-full text-sm">
    <thead class="bg-amber-50/60 text-xs uppercase tracking-wide text-gray-600">
      <tr><th class="p-3 text-left">Student</th><th class="p-3 text-left">Track</th><th class="p-3 text-left">Recommender</th>
          <th class="p-3 text-left">School</th><th class="p-3 text-left">Status</th>
          <th class="p-3 text-left">Submitted</th><th></th></tr>
    </thead><tbody>${



        rows}</tbody></table>`;
    }

    function viewRec(rec) {
        document.getElementById("modalTitle").textContent = "Recommendation — " + rec.studentName;
        document.getElementById("modalSub").textContent = `${rec.teacherName} (${rec.teacherEmail}) · ${rec.track}`;
        const resp = rec.responses || {};
        const rows = Object.keys(resp).map(k => `<tr class="border-b border-gray-100"><td class="py-2 pr-4 text-gray-600 align-top">${escapeHtml(k)}</td><td class="py-2"><strong>${escapeHtml(String(resp[k]))}</strong></td></tr>`).join("");
        document.getElementById("modalBody").innerHTML = rows ? `<table class="w-full text-sm">${rows}</table>` : "<p class='text-gray-500'>No responses.</p>";
        document.getElementById("modal").classList.remove("hidden");
    }

    // ── APPLICATION DETAIL MODAL ──
    function openModal(studentId) {
        const a = applications.find(x => String(x.studentId) === String(studentId));
        if (!a)
            return;
        document.getElementById("modalTitle").textContent = a.studentName;
        document.getElementById("modalSub").textContent = `${a.studentId} · Grade ${a.grade} · ${a.track}`;

        const filesHtml = Object.entries(a.files || {}).filter(([, v]) => v).map(([k, v]) =>
        `<a href="${escapeHtml(v)}" target="_blank" class="inline-block btn-ghost text-xs mr-2 mb-2">📄 Form ${k}</a>`
        ).join("") || '<span class="text-gray-500 text-sm">No files uploaded.</span>';

        // ── Merge parent-nominated teachers (from Applications sheet L2_*) with already-invited recs ──
        const invited = a.recommenders || [];
        const invitedEmails = new Set(invited.map(r => (r.teacherEmail || "").toLowerCase().trim()).filter(Boolean));
        const nominated = [];
        [a.teacher1, a.teacher2].forEach((t, idx) => {
            if (!t || !t.email)
                return;
            const em = t.email.toLowerCase().trim();
            if (!invitedEmails.has(em))
                nominated.push({
                    ...t,
                    slot: idx + 1
                });
        });

        const initials = s => (s || "?").toString().trim().split(/\s+/).map(w => w[0]).slice(0, 2).join("").toUpperCase();
        const renderRec = (r, isNominated) => {
            const auto = !isNominated && r.status === 'Submitted' && r.responses ? scoreRecommendation(a.track, r.responses) : null;
            return `
    <div class="rec-row ${isNominated ? 'nominated' : ''}">
      <div class="flex items-center gap-3 min-w-0 flex-1">
        <div class="rec-avatar">${
            initials(r.teacherName || r.name)}</div>
        <div class="min-w-0 flex-1">
          <div class="font-semibold truncate">${
            escapeHtml(r.teacherName || r.name || "(unnamed)")}</div>
          <div class="text-xs text-gray-500 truncate">${escapeHtml(r.teacherEmail || r.email || "")}${r.school ? ` · ${escapeHtml(r.school)}` : ""}</div>
        </div>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        ${


            auto ? scoreBadge(auto.pct) : ""}
        ${isNominated ? `<span class="chip chip-nominated">Nominated by parent</span>

    function scoreRecommendation(track, responses) {
        const cfg = REC_SCORING[track];
        if (!cfg || !responses)
            return null;
        let earned = 0,
            possible = 0,
            scored = 0,
            skipped = 0;
        const breakdown = [];
        for (const key in cfg.fields) {
            const ans = responses[key];
            if (ans === undefined || ans === null || ans === "")
                continue;
            const map = cfg.fields[key];
            const pts = map[ans];
            if (pts === null) {
                skipped++;
                breakdown.push({
                    key,
                    ans,
                    pts: "—"
                });
                continue;
            } // "No Basis" → exclude
            const maxForField = Math.max(...Object.values(map).filter(v => v !== null));
            if (typeof pts === "number") {
                earned += pts;
                possible += maxForField;
                scored++;
                breakdown.push({
                    key,
                    ans,
                    pts,
                    max: maxForField
                });
            }
        }
        if (!possible)
            return null;
        const pct = (earned / possible) * 100;
        return {
            earned,
            possible,
            pct: Math.round(pct),
            scored,
            skipped,
            breakdown
        };
    }

    // Aggregate all submitted recs for an application
    function aggregateRecScores(app) {
        const submitted = (app.recommenders || []).filter(r => r.status === "Submitted" && r.responses);
        if (!submitted.length)
            return null;
        const scores = submitted.map(r => scoreRecommendation(app.track, r.responses)).filter(Boolean);
        if (!scores.length)
            return null;
        const avgPct = Math.round(scores.reduce((s, x) => s + x.pct, 0) / scores.length);
        return {
            avgPct,
            count: scores.length,
            individual: scores
        };
    }

    function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, c => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
        }[c]));
    }
    </script>
