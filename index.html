<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVA Scholarship — Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    :root {
        --clr-forest: #143628;
        --clr-sage: #5b8274;
        --clr-gold: #c29b3c;
        --clr-gold-light: #fbf8f0;
        --clr-cream: #f9f8f6;
        --clr-border: #e6e4df;
        --clr-text-main: #2c2a29;
        --clr-text-muted: #6b6965;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--clr-cream);
        color: var(--clr-text-main);
        -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, .serif {
        font-family: 'Lora', serif;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d0cb; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a6a1; }

    /* Buttons */
    .btn-primary {
        background: var(--clr-forest);
        color: #fff;
        padding: 0.6rem 1.25rem;
        border-radius: 0.5rem;
        font-weight: 500;
        transition: all 0.2s ease;
        border: 1px solid transparent;
        box-shadow: 0 2px 4px rgba(20, 54, 40, 0.1);
    }
    .btn-primary:hover {
        background: #0d261b;
        box-shadow: 0 4px 12px rgba(20, 54, 40, 0.2);
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-gold {
        background: var(--clr-gold-light);
        color: var(--clr-forest);
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-weight: 600;
        border: 1px solid #ebdca8;
        transition: all 0.2s ease;
    }
    .btn-gold:hover {
        background: #f4ecce;
        border-color: var(--clr-gold);
    }

    .btn-ghost {
        background: #fff;
        border: 1px solid var(--clr-border);
        color: var(--clr-text-main);
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-weight: 500;
        transition: all 0.2s ease;
        box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    .btn-ghost:hover {
        border-color: #d0cece;
        background: #fafafa;
    }

    /* Layout & Cards */
    .card {
        background: #fff;
        border: 1px solid var(--clr-border);
        border-radius: 1rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
    }

    /* Forms */
    .form-input {
        width: 100%;
        padding: 0.6rem 0.85rem;
        border-radius: 0.5rem;
        border: 1px solid var(--clr-border);
        background: #fff;
        color: var(--clr-text-main);
        transition: all 0.2s ease;
        font-size: 0.95rem;
    }
    .form-input:focus {
        outline: none;
        border-color: var(--clr-gold);
        box-shadow: 0 0 0 3px rgba(194, 155, 60, 0.15);
    }
    select.form-input { appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b6965' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; }

    /* Typography Labels */
    .section-label {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--clr-text-muted);
    }

    /* Chips & Badges */
    .chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.02em;
    }
    .chip-sent { background: #fdf8e9; color: #8a6a15; border: 1px solid #f2e2b3; }
    .chip-done { background: #eef7f4; color: #1a5c46; border: 1px solid #c8e6da; }
    .chip-pending { background: #f5f4f2; color: #6b6965; border: 1px solid #e1dfda; }
    .chip-nominated { background: #f8f9fa; color: #475569; border: 1px dashed #cbd5e1; }
    
    .track-budding { background: #fdf5ef; color: #8a4c15; }
    .track-junior { background: #eff4fb; color: #1e4b8a; }
    .track-future { background: #ecf8f3; color: #065f46; }

    /* Table Enhancements */
    table th { font-family: 'DM Sans', sans-serif; font-weight: 600; color: var(--clr-text-muted); border-bottom: 1px solid var(--clr-border); }
    table tr { transition: background 0.15s ease; }
    table tr:hover td { background: #fcfbf9; }
    
    /* Recommender Rows */
    .rec-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem;
        border-radius: 0.75rem;
        background: #fff;
        border: 1px solid var(--clr-border);
        margin-bottom: 0.75rem;
        transition: border-color 0.2s;
    }
    .rec-row:hover { border-color: #d4d2cc; }
    .rec-row.nominated { background: #fafaf9; border-style: dashed; }
    
    .rec-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #f1f0ec;
        color: var(--clr-forest);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.85rem;
        flex-shrink: 0;
        border: 1px solid #e2e0da;
    }

    /* Modal / Slide-over */
    .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(20, 54, 40, 0.4);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 2rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }
    .modal-bg.active { opacity: 1; pointer-events: auto; }
    
    .modal {
        background: var(--clr-cream);
        border-radius: 1.25rem;
        width: 100%;
        max-width: 1100px;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        transform: scale(0.98);
        transition: transform 0.3s ease;
        overflow: hidden;
    }
    .modal-bg.active .modal { transform: scale(1); }

    .modal-header {
        background: #fff;
        padding: 1.5rem 2rem;
        border-bottom: 1px solid var(--clr-border);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        z-index: 10;
    }
    .modal-body {
        overflow-y: auto;
        padding: 2rem;
        flex: 1;
    }

    /* Tabs */
    .tab-nav { border-bottom: 1px solid var(--clr-border); display: flex; gap: 2rem; }
    .tab {
        padding: 1rem 0;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        font-weight: 500;
        color: var(--clr-text-muted);
        transition: all 0.2s;
    }
    .tab:hover { color: var(--clr-text-main); }
    .tab.active {
        border-color: var(--clr-forest);
        color: var(--clr-forest);
        font-weight: 600;
    }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <section id="loginView" class="absolute inset-0 z-50 flex items-center justify-center p-4 bg-stone-50" style="background-image: radial-gradient(#e6e4df 1px, transparent 1px); background-size: 32px 32px;">
        <div class="card max-w-md w-full p-10 text-center relative overflow-hidden bg-white/95 backdrop-blur shadow-2xl border-0 ring-1 ring-stone-900/5">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-stone-200 via-stone-400 to-stone-200"></div>
            
            <div class="mx-auto w-16 h-16 rounded-2xl bg-stone-50 border border-stone-100 flex items-center justify-center mb-6 shadow-sm">
                <span class="font-serif font-bold text-2xl text-[var(--clr-forest)]">SVA</span>
            </div>

            <h1 class="text-3xl mb-2 font-medium text-[var(--clr-forest)]">Scholarship Review</h1>
            <p class="text-sm text-stone-500 mb-8 font-medium">Committee Evaluation Portal</p>
            
            <div id="googleBtn" class="flex justify-center h-11"></div>
            <p id="loginError" class="text-red-600 text-sm mt-4 hidden bg-red-50 p-2 rounded-lg"></p>
            
            <div class="mt-8 pt-6 border-t border-stone-100">
                <p class="text-[10px] uppercase tracking-widest text-stone-400">Authorized Personnel Only</p>
            </div>
        </div>
    </section>

    <section id="dashboardView" class="hidden flex-1 flex flex-col">
        <header class="bg-white border-b border-[var(--clr-border)] sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-8 py-5 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-[#f4f2ec] flex items-center justify-center border border-[#e2dfd5]">
                        <span class="font-serif font-bold text-xl text-[var(--clr-forest)]">SVA</span>
                    </div>
                    <div>
                        <h1 class="text-2xl font-medium text-[var(--clr-forest)] tracking-tight">Admissions & Scholarships</h1>
                        <p class="text-xs text-[var(--clr-text-muted)] font-medium mt-0.5">Logged in as <span id="adminEmail" class="text-stone-800"></span></p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="loadApplications()" class="btn-ghost flex items-center gap-2 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Refresh Data
                    </button>
                    <button onclick="signOut()" class="text-sm text-stone-500 hover:text-stone-800 font-medium transition px-2">Sign out</button>
                </div>
            </div>
            <div class="max-w-7xl mx-auto px-8 tab-nav">
                <div class="tab active" onclick="switchTab('apps',this)">Applications Directory</div>
                <div class="tab" onclick="switchTab('recs',this)">Recommendation Status</div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-8 w-full flex-1">
            <div id="statsBar" class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8"></div>

            <div id="tabApps">
                <div class="flex flex-col md:flex-row gap-3 mb-6 bg-white p-3 rounded-xl border border-[var(--clr-border)] shadow-sm">
                    <div class="relative flex-1">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input id="searchBox" class="form-input pl-9 border-transparent shadow-none bg-stone-50 focus:bg-white" placeholder="Search applicant name, email, or ID..." oninput="renderApps()">
                    </div>
                    <div class="w-px bg-stone-200 hidden md:block mx-1"></div>
                    <select id="trackFilter" class="form-input md:w-48 border-transparent shadow-none bg-stone-50 hover:bg-stone-100 cursor-pointer" onchange="renderApps()">
                        <option value="">All Tracks</option>
                        <option>Budding Scholar</option>
                        <option>Junior Innovator</option>
                        <option>Future Leader</option>
                    </select>
                    <select id="statusFilter" class="form-input md:w-48 border-transparent shadow-none bg-stone-50 hover:bg-stone-100 cursor-pointer" onchange="renderApps()">
                        <option value="">All Statuses</option>
                        <option>Submitted</option>
                        <option>Under Review</option>
                        <option>Approved</option>
                        <option>Rejected</option>
                    </select>
                </div>
                
                <div class="card overflow-hidden bg-white">
                    <div id="appsTable" class="w-full overflow-x-auto"></div>
                </div>
            </div>

            <div id="tabRecs" class="hidden">
                <div class="card overflow-hidden bg-white">
                    <div id="recsTable" class="w-full overflow-x-auto"></div>
                </div>
            </div>
        </main>
    </section>

    <div id="modal" class="modal-bg">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <div class="flex items-center gap-3 mb-1">
                        <h2 class="text-2xl font-medium text-[var(--clr-forest)]" id="modalTitle"></h2>
                        <span id="modalStatusBadge"></span>
                    </div>
                    <p class="text-sm text-[var(--clr-text-muted)] font-medium" id="modalSub"></p>
                </div>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100 text-stone-400 hover:text-stone-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="modal-body bg-[var(--clr-cream)]">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 h-full">
                    
                    <div class="lg:col-span-7 space-y-8" id="modalLeftCol">
                        </div>

                    <div class="lg:col-span-5 relative">
                        <div class="sticky top-0" id="modalRightCol">
                             </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
    // ── CONFIG ──
    const GOOGLE_CLIENT_ID = "14216824305-v19ecsmrhk1muaglrlhjceqjk5oeqr4n.apps.googleusercontent.com";
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzZ9LBchK0uKXZbrp_F-DuGddmIlXy1nVxjmjDVDTNZr8NXeGhD-AdIdkXeCO7e6kDNvA/exec";
    const RECOMMENDER_URL = "https://recommend.svaportal.com";
    let idToken = null;
    let currentEmail = null;
    let applications = [];

    // ── GOOGLE AUTH ──
    window.onload = () => {
        const interval = setInterval(() => {
            if (window.google && window.google.accounts) {
                clearInterval(interval);
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleCredential
                });
                google.accounts.id.renderButton(document.getElementById("googleBtn"),
                {
                    theme: "outline",
                    size: "large",
                    text: "signin_with",
                    shape: "rectangular"
                });
            }
        }, 100);
    };

    async function handleCredential(resp) {
        idToken = resp.credential;
        document.getElementById("googleBtn").innerHTML = "<div class='text-sm text-stone-500 py-2'>Verifying securely...</div>";
        try {
            const r = await callBackend({ action: "adminVerify", token: idToken });
            if (r.status !== "success") { showLoginError(r.message); return; }
            currentEmail = r.email;
            document.getElementById("adminEmail").textContent = r.email;
            document.getElementById("loginView").classList.add("hidden");
            document.getElementById("dashboardView").classList.remove("hidden");
            loadApplications();
        } catch (e) { showLoginError("Network error: " + e.message); }
    }

    function showLoginError(msg) {
        const el = document.getElementById("loginError");
        el.textContent = msg; el.classList.remove("hidden");
        document.getElementById("googleBtn").innerHTML = "";
        google.accounts.id.renderButton(document.getElementById("googleBtn"), { theme: "outline", size: "large", text: "signin_with" });
    }

    function signOut() { google.accounts.id.disableAutoSelect(); location.reload(); }

    async function callBackend(payload) {
        const r = await fetch(BACKEND_URL, {
            method: "POST",
            body: JSON.stringify(payload),
            headers: { "Content-Type": "text/plain;charset=utf-8" } 
        });
        return r.json();
    }

    async function loadApplications() {
        const r = await callBackend({ action: "listApplications", token: idToken });
        if (r.status !== "success") { alert(r.message); return; }
        applications = r.applications || [];
        renderStats();
        renderApps();
    }

    function renderStats() {
        const total = applications.length;
        const submitted = applications.filter(a => a.status === "Submitted").length;
        const scored = applications.filter(a => (a.scores || []).length > 0).length;
        const pendingRecs = applications.reduce((n, a) => n + (a.recommenders || []).filter(r => r.status !== "Submitted").length, 0);
        
        const cards = [
            { label: "Total Applications", value: total, sub: submitted + " fully submitted" },
            { label: "Awaiting Review", value: submitted - scored, sub: scored + " evaluations completed" },
            { label: "Pending Recommenders", value: pendingRecs, sub: "Action required by teachers" },
            { label: "Lower School", value: applications.filter(a => a.track === "Budding Scholar").length, sub: "Grades K–2" },
            { label: "Upper School", value: applications.filter(a => a.track !== "Budding Scholar").length, sub: "Grades 3–8" }
        ];
        
        document.getElementById("statsBar").innerHTML = cards.map(c => `
            <div class="bg-white rounded-xl p-5 border border-[var(--clr-border)] shadow-sm relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-[var(--clr-gold)] opacity-50"></div>
                <div class="section-label mb-2">${c.label}</div>
                <div class="text-3xl font-serif font-medium text-[var(--clr-forest)] mb-1">${c.value}</div>
                <div class="text-xs text-stone-500 font-medium">${c.sub}</div>
            </div>`).join("");
    }

    function trackChip(t) {
        const cls = t === "Budding Scholar" ? "track-budding" : t === "Junior Innovator" ? "track-junior" : "track-future";
        return `<span class="chip ${cls}">${t || "—"}</span>`;
    }

    function renderApps() {
        const q = (document.getElementById("searchBox").value || "").toLowerCase();
        const tf = document.getElementById("trackFilter").value;
        const sf = document.getElementById("statusFilter").value;
        
        const filtered = applications.filter(a => {
            if (tf && a.track !== tf) return false;
            if (sf && a.status !== sf) return false;
            if (q) {
                const hay = [a.studentName, a.studentEmail, a.parentEmail, a.studentId].join(" ").toLowerCase();
                if (!hay.includes(q)) return false;
            }
            return true;
        });

        if (!filtered.length) {
            document.getElementById("appsTable").innerHTML = '<div class="p-12 text-center text-stone-500 font-medium">No matching applications found.</div>';
            return;
        }

        const initials = s => (s || "?").toString().trim().split(/\s+/).map(w => w[0]).slice(0, 2).join("").toUpperCase();
        
        const rows = filtered.map(a => {
            const invited = a.recommenders || [];
            const recCount = invited.length;
            const recDone = invited.filter(r => r.status === "Submitted").length;
            const nomCount = [a.teacher1, a.teacher2].filter(t => t && t.email).length;
            const scoreCount = (a.scores || []).length;
            const avg = scoreCount ? (a.scores.reduce((s, x) => s + Number(x.total || 0), 0) / scoreCount).toFixed(1) : "—";
            
            const recLabel = recCount > 0
                ? `<span class="px-2 py-1 rounded-md text-xs font-semibold ${recDone === recCount ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'}">${recDone}/${recCount} Recs</span>`
                : (nomCount > 0 ? `<span class="text-stone-400 italic text-xs">${nomCount} Nominated</span>` : `<span class="text-stone-300">—</span>`);
            
            return `
            <tr class="cursor-pointer group" onclick='openModal(${JSON.stringify(a.studentId)})'>
                <td class="p-4 pl-6 border-b border-[var(--clr-border)]">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-stone-100 to-stone-200 text-[var(--clr-forest)] flex items-center justify-center font-bold text-sm border border-stone-200 group-hover:border-stone-300 transition-colors">${initials(a.studentName)}</div>
                        <div>
                            <div class="font-semibold text-[var(--clr-text-main)] group-hover:text-[var(--clr-forest)] transition-colors">${escapeHtml(a.studentName || "")}</div>
                            <div class="text-xs text-stone-400 font-mono mt-0.5">${escapeHtml(a.studentId || "")}</div>
                        </div>
                    </div>
                </td>
                <td class="p-4 border-b border-[var(--clr-border)] text-sm font-medium text-stone-600">Grade ${escapeHtml(a.grade || "")}</td>
                <td class="p-4 border-b border-[var(--clr-border)]">${trackChip(a.track)}</td>
                <td class="p-4 border-b border-[var(--clr-border)] text-sm text-stone-500">${escapeHtml(a.parentEmail || "")}</td>
                <td class="p-4 border-b border-[var(--clr-border)]"><span class="chip ${a.status === 'Submitted' ? 'chip-sent' : 'chip-pending'}">${escapeHtml(a.status || "—")}</span></td>
                <td class="p-4 border-b border-[var(--clr-border)]">${recLabel}</td>
                <td class="p-4 pr-6 border-b border-[var(--clr-border)] text-sm">
                    ${scoreCount ? `<div class="flex items-center gap-1.5"><span class="font-bold text-[var(--clr-forest)]">${avg}</span><span class="text-[10px] text-stone-400 font-medium tracking-wider uppercase">(${scoreCount} Eval)</span></div>` : "<span class='text-stone-300'>—</span>"}
                </td>
            </tr>`;
        }).join("");

        document.getElementById("appsTable").innerHTML = `
        <table class="w-full text-left border-collapse whitespace-nowrap">
            <thead class="bg-stone-50/50 uppercase text-[10px] tracking-wider text-stone-500">
                <tr>
                    <th class="p-4 pl-6 font-semibold">Applicant Profile</th>
                    <th class="p-4 font-semibold">Level</th>
                    <th class="p-4 font-semibold">Track</th>
                    <th class="p-4 font-semibold">Primary Contact</th>
                    <th class="p-4 font-semibold">Status</th>
                    <th class="p-4 font-semibold">Recommendations</th>
                    <th class="p-4 pr-6 font-semibold">Avg Score</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>`;
    }

    function switchTab(which, el) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("tabApps").classList.toggle("hidden", which !== "apps");
        document.getElementById("tabRecs").classList.toggle("hidden", which !== "recs");
        if (which === "recs") loadRecs();
    }

    async function loadRecs() {
        const r = await callBackend({ action: "listRecommendations", token: idToken });

    async function inviteNominated(studentId, teacher) {
        const rec = { name: teacher.teacherName || teacher.name || "", email: teacher.teacherEmail || teacher.email || "", school: teacher.school || "" };
        if (!rec.email) { alert("No email on file."); return; }
        const r = await callBackend({ action: "sendRecommenderLinks", token: idToken, studentId, recommenders: [rec], recommenderUrl: RECOMMENDER_URL });
        if (r.status !== "success") { alert(r.message || "Failed."); return; }
        await loadApplications();
        openModal(studentId);
    }

    async function inviteAllNominated(studentId) {
        const a = applications.find(x => String(x.studentId) === String(studentId));
        if (!a) return;
        const invitedEmails = new Set((a.recommenders || []).map(r => (r.teacherEmail || "").toLowerCase().trim()));
        const recs = [a.teacher1, a.teacher2].filter(t => t && t.email && !invitedEmails.has(t.email.toLowerCase().trim())).map(t => ({ name: t.name, email: t.email, school: t.school }));
        if (!recs.length) return;
        if (!confirm(`Send secure recommendation links to ${recs.length} teacher(s)?`)) return;
        const r = await callBackend({ action: "sendRecommenderLinks", token: idToken, studentId, recommenders: recs, recommenderUrl: RECOMMENDER_URL });
        if (r.status !== "success") { alert(r.message || "Failed."); return; }
        await loadApplications();
        openModal(studentId);
    }

    // Scoring logic dictionaries (Unchanged)
    const REC_SCORING = {
        "Budding Scholar": { maxRaw: 18, fields: { "t_social": { "Consistently": 3, "Emerging (Sometimes)": 2, "Needs Support": 1 }, "t_emotion": { "Consistently": 3, "Emerging (Sometimes)": 2, "Needs Support": 1 }, "t_norms": { "Consistently": 3, "Emerging (Sometimes)": 2, "Needs Support": 1 }, "t_effort": { "Consistently": 3, "Emerging (Sometimes)": 2, "Needs Support": 1 }, "r_family": { "Yes, supportive": 3, "Inconsistent": 2, "No / Disengaged": 0 }, "r_overall": { "Recommended (positive addition to the class)": 3, "Conditional (needs specific behavioral goals)": 2, "Not Recommended (significant concerns)": 0 } } },
        "Junior Innovator": { maxRaw: 21, fields: { "t_responsibility": { "Consistently": 3, "Sometimes": 2, "Rarely": 1 }, "t_kindness": { "Consistently": 3, "Sometimes": 2, "Rarely": 1 }, "t_resilience": { "Consistently": 3, "Sometimes": 2, "Rarely": 1 }, "t_selfcontrol": { "Consistently": 3, "Sometimes": 2, "Rarely": 1 }, "r_infractions": { "No": 3, "Yes": 0 }, "r_extramile": { "Yes, frequently": 3, "Occasionally": 2, "No, they generally stick to their own tasks": 1 }, "r_endorsement": { "Yes, I support this": 3, "Yes, with some hesitation": 2, "No": 0 } } },
        "Future Leader": { maxRaw: 27, fields: { "t_integrity": { "Exceptional (Top 10%)": 4, "Good (Top 25%)": 3, "Average": 2, "Below Average": 1, "No Basis": null }, "t_resilience": { "Exceptional (Top 10%)": 4, "Good (Top 25%)": 3, "Average": 2, "Below Average": 1, "No Basis": null }, "t_leadership": { "Exceptional (Top 10%)": 4, "Good (Top 25%)": 3, "Average": 2, "Below Average": 1, "No Basis": null }, "t_respect": { "Exceptional (Top 10%)": 4, "Good (Top 25%)": 3, "Average": 2, "Below Average": 1, "No Basis": null }, "t_service": { "Exceptional (Top 10%)": 4, "Good (Top 25%)": 3, "Average": 2, "Below Average": 1, "No Basis": null }, "r_obligations": { "Yes": 3, "Usually": 2, "No": 1 }, "r_overall": { "I enthusiastically recommend (One of my top students)": 4, "I strongly recommend": 3, "I recommend": 2, "I recommend with reservation": 1 } } }
    };

    function scoreRecommendation(track, responses) {
        const cfg = REC_SCORING[track];
        if (!cfg || !responses) return null;
        let earned = 0, possible = 0, scored = 0, skipped = 0;
        const breakdown = [];
        for (const key in cfg.fields) {
            const ans = responses[key];
            if (ans === undefined || ans === null || ans === "") continue;
            const map = cfg.fields[key];
            const pts = map[ans];
            if (pts === null) { skipped++; breakdown.push({ key, ans, pts: "—" }); continue; }
            const maxForField = Math.max(...Object.values(map).filter(v => v !== null));
            if (typeof pts === "number") { earned += pts; possible += maxForField; scored++; breakdown.push({ key, ans, pts, max: maxForField }); }
        }
        if (!possible) return null;
        return { earned, possible, pct: Math.round((earned / possible) * 100), scored, skipped, breakdown };
    }

    function aggregateRecScores(app) {
        const submitted = (app.recommenders || []).filter(r => r.status === "Submitted" && r.responses);
        if (!submitted.length) return null;
        const scores = submitted.map(r => scoreRecommendation(app.track, r.responses)).filter(Boolean);
        if (!scores.length) return null;
        return { avgPct: Math.round(scores.reduce((s, x) => s + x.pct, 0) / scores.length), count: scores.length, individual: scores };
    }

    function scoreBadge(pct) {
        const color = pct >= 85 ? "text-emerald-700 bg-emerald-50 border-emerald-200" : pct >= 70 ? "text-amber-700 bg-amber-50 border-amber-200" : pct >= 50 ? "text-orange-700 bg-orange-50 border-orange-200" : "text-rose-700 bg-rose-50 border-rose-200";
        return `<span class="chip border ${color} font-bold shadow-sm">Score: ${pct}/100</span>`;
    }

    function rubricForTrack(track) {
        if (track === "Budding Scholar") return [{ key: "academic", max: 20, label: "Readiness", desc: "Age-appropriate development" }, { key: "character", max: 40, label: "Citizenship", desc: "Social/emotional & norms" }, { key: "essay", max: 20, label: "Family Fit", desc: "Partnership & support" }, { key: "need", max: 20, label: "Financial Need", desc: "Demonstrated necessity" }];
        if (track === "Junior Innovator") return [{ key: "academic", max: 25, label: "Academic", desc: "Progress & curiosity" }, { key: "character", max: 30, label: "Grit & Citizenship", desc: "Teacher traits" }, { key: "essay", max: 25, label: "Parent Essay", desc: "Clarity & fit" }, { key: "need", max: 20, label: "Financial Need", desc: "Demonstrated necessity" }];
        return [{ key: "academic", max: 25, label: "Academic", desc: "Transcript / performance" }, { key: "character", max: 25, label: "Character", desc: "Recommender ratings" }, { key: "essay", max: 30, label: "Student Essay", desc: "Depth, voice, maturity" }, { key: "need", max: 20, label: "Financial Need", desc: "Demonstrated necessity" }];
    }

    function updateTotal() {
        let t = 0;
        document.querySelectorAll("[data-score]").forEach(i => t += Number(i.value || 0));
        document.getElementById("scoreTotal").textContent = t;
    }

    function applySuggestion(val) {
        const input = document.querySelector('[data-score="character"]');
        if (!input) return;
        input.value = val;
        updateTotal();
        input.focus();
    }

    function viewRecFromApp(studentId, teacherEmail) {
        const a = applications.find(x => String(x.studentId) === String(studentId));
        if (!a) return;
        const r = (a.recommenders || []).find(x => (x.teacherEmail || "").toLowerCase() === String(teacherEmail).toLowerCase());
        if (!r) return;
        
        const auto = scoreRecommendation(a.track, r.responses || {});
        const resp = r.responses || {};
        const pretty = k => k.replace(/^t_/, "Trait: ").replace(/^r_/, "").replace(/^ta_/, "").replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());

        const rowsHtml = Object.keys(resp).filter(k => !k.startsWith("_")).map(k => {
            let pts = "";
            if (auto) {
                const f = auto.breakdown.find(b => b.key === k);
                if (f) pts = f.pts === "—" ? `<span class="text-stone-400 text-[10px] uppercase">No Basis</span>` : `<span class="font-bold text-[var(--clr-forest)] bg-stone-100 px-2 py-0.5 rounded">${f.pts}/${f.max}</span>`;
            }
            return `
            <div class="py-3 border-b border-stone-100 flex justify-between gap-4">
                <div class="flex-1">
                    <p class="text-[10px] font-bold text-stone-400 uppercase tracking-wide mb-0.5">${escapeHtml(pretty(k))}</p>
                    <p class="text-sm font-medium text-stone-800">${escapeHtml(String(resp[k]))}</p>
                </div>
                <div class="flex-shrink-0 pt-3">${pts}</div>
            </div>`;
        }).join("");

        let header = "";
        if (auto) {
            header = `
            <div class="bg-gradient-to-r from-[var(--clr-gold-light)] to-white border border-[#e8dfc3] rounded-xl p-4 mb-6 flex justify-between items-center shadow-sm">
                <div>
                    <h4 class="font-bold text-[var(--clr-forest)] text-sm">Automated Rubric Score</h4>
                    <p class="text-xs text-stone-500 mt-0.5 font-medium">${auto.scored} answered${auto.skipped ? ` • ${auto.skipped} skipped` : ""}</p>
                </div>
                <div class="text-right">
                    <div class="text-2xl font-serif font-bold text-[var(--clr-forest)]">${auto.pct}<span class="text-sm text-stone-400">/100</span></div>
                </div>
            </div>`;
        }

        document.getElementById("modalLeftCol").innerHTML = `
            <button onclick='openModal(${JSON.stringify(studentId)})' class="mb-4 text-xs font-bold text-stone-500 hover:text-[var(--clr-forest)] flex items-center gap-1 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Application View
            </button>
            <div class="bg-white rounded-xl p-6 border border-stone-200 shadow-sm">
                <h3 class="font-serif text-lg text-[var(--clr-forest)] mb-1">Recommendation Responses</h3>
                <p class="text-sm text-stone-500 mb-6 font-medium">Submitted by ${escapeHtml(r.teacherName)}</p>
                ${header}
                <div class="space-y-1">${rowsHtml || '<p class="text-stone-500 text-sm">No recorded responses.</p>'}</div>
            </div>`;
    }

    async function saveScore(studentId, studentName, track) {
        const payload = { action: "scoreApplication", token: idToken, studentId, studentName, track, recommendation: document.getElementById("rec_recommendation").value, notes: document.getElementById("rec_notes").value };
        document.querySelectorAll("[data-score]").forEach(i => payload[i.dataset.score] = Number(i.value || 0));
        
        const btn = event.target;
        btn.textContent = "Saving...";
        btn.disabled = true;

        const r = await callBackend(payload);
        if (r.status === "success") {
            await loadApplications();
            openModal(studentId);
        } else {
            alert(r.message || "Failed.");
            btn.textContent = "Submit Evaluation";
            btn.disabled = false;
        }
    }

    function showRecForm(studentId) {
        const wrap = document.getElementById("recFormWrap");
        wrap.classList.remove("hidden");
        wrap.innerHTML = `
        <div class="mb-4">
            <h4 class="font-serif text-[var(--clr-forest)] text-lg">Manually Invite Recommender</h4>
            <p class="text-xs text-stone-500 mt-0.5 font-medium">A single-use, secure link will be emailed immediately.</p>
        </div>
        <div id="recRows" class="space-y-2"></div>
        <button onclick="addRecRow()" class="text-[10px] font-bold uppercase tracking-wider text-[var(--clr-sage)] hover:text-[var(--clr-forest)] mt-3 mb-4">+ Add Row</button>
        <div class="flex justify-end gap-3 pt-4 border-t border-[var(--clr-gold)]/20">
            <button onclick="document.getElementById('recFormWrap').classList.add('hidden')" class="btn-ghost text-sm">Cancel</button>
            <button onclick="submitRecs('${studentId}')" class="btn-primary text-sm shadow-md shadow-green-900/10">Send Secure Links</button>
        </div>`;
        addRecRow();
    }

    function addRecRow() {
        const r = document.createElement("div");
        r.className = "grid grid-cols-1 md:grid-cols-3 gap-3";
        r.innerHTML = `
            <input class="form-input text-sm shadow-none" placeholder="Teacher Name" data-rec="name">
            <input class="form-input text-sm shadow-none" placeholder="Email Address" type="email" data-rec="email">
            <input class="form-input text-sm shadow-none" placeholder="Current School" data-rec="school">`;
        document.getElementById("recRows").appendChild(r);
    }

    async function submitRecs(studentId) {
        const rows = document.getElementById("recRows").querySelectorAll("div.grid");
        const recommenders = [];
        rows.forEach(row => {
            const rec = {};
            row.querySelectorAll("[data-rec]").forEach(i => rec[i.dataset.rec] = i.value.trim());
            if (rec.email) recommenders.push(rec);
        });
        if (!recommenders.length) return alert("Add at least one valid email.");
        
        const r = await callBackend({ action: "sendRecommenderLinks", token: idToken, studentId, recommenders, recommenderUrl: RECOMMENDER_URL });
        if (r.status !== "success") return alert(r.message || "Failed.");
        
        await loadApplications();
        openModal(studentId);
    }

    function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    </script>
</body>
</html>
